<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>VORTA · Conecta tu WhatsApp</title>

  <!-- ====================================================================
       CONFIGURACIÓN  (valores públicos, salvo ONBOARD_SECRET)
       ==================================================================== -->
  <script>
    const CONFIG = {
      // Meta App "VORTA Platform" (valores públicos)
      META_APP_ID:   "1391319849718291",
      CONFIG_ID:     "1719626502389702",   // Config ID del Embedded Signup
      GRAPH_VERSION: "v21.0",

      // Endpoint de alta (Edge Function de Supabase)
      WA_ONBOARD_URL: "https://iupcodfmtspifmczppje.supabase.co/functions/v1/wa-onboard",

      // ⚠️ MISMO valor que el secreto ONBOARD_SECRET en Supabase.
      ONBOARD_SECRET: "3c04cb5fc7b455658a7889e02150ac517435bc790f571b27",
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #07070c;
      --panel:     #131320;
      --panel-2:   #0e0e18;
      --border:    rgba(255,255,255,.07);
      --border-2:  rgba(255,255,255,.10);
      --text:      #f3f4f8;
      --muted:     #9a9bad;
      --muted-2:   #6c6d82;
      --brand:     #7c6cff;
      --brand-2:   #5a49e6;
      --field:     #0c0c16;
      --ok:        #43e08a;
      --err:       #ff6b7a;
      --warn:      #ffb454;
      --radius:    22px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(800px 460px at 50% -8%, rgba(124,108,255,.22), transparent 62%),
        radial-gradient(620px 480px at 110% 115%, rgba(124,108,255,.08), transparent 60%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 40px 120px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
      padding: 38px 36px 34px;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 30px;
    }
    .logo .mark {
      width: 16px; height: 16px;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 0 16px rgba(124,108,255,.7);
    }
    .logo .name {
      font-weight: 800;
      letter-spacing: 1.5px;
      font-size: 15px;
    }

    /* Encabezado */
    h1 {
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -.4px;
    }
    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.55;
    }

    /* Campos */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 9px;
    }
    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--field);
      border: 1px solid var(--border-2);
      border-radius: 13px;
      color: var(--text);
      font-size: 14.5px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .field input::placeholder { color: var(--muted-2); }
    .field input:focus {
      border-color: var(--brand);
      background: #0e0e1c;
      box-shadow: 0 0 0 3px rgba(124,108,255,.16);
    }

    /* Botón */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 16px 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff;
      font-size: 15.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 12px 30px rgba(90,73,230,.35);
      transition: transform .08s, filter .15s, opacity .15s, box-shadow .15s;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 14px 36px rgba(90,73,230,.45); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }

    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Estado */
    .status {
      margin-top: 16px;
      padding: 13px 15px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.5;
      display: none;
      border: 1px solid transparent;
    }
    .status.show { display: block; }
    .status.ok   { background: rgba(67,224,138,.10); border-color: rgba(67,224,138,.3); color: #9af0c0; }
    .status.err  { background: rgba(255,107,122,.10); border-color: rgba(255,107,122,.3); color: #ffb3ba; }
    .status.warn { background: rgba(255,180,84,.10); border-color: rgba(255,180,84,.3); color: #ffd8a0; }
    .status code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 5px; font-size: 12px; }

    /* Pie */
    .foot {
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      font-size: 12.5px;
      color: var(--muted-2);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <span class="mark"></span>
      <span class="name">VORTA</span>
    </div>

    <h1>Conecta tu WhatsApp</h1>
    <p class="sub">Vincula el número oficial de tu negocio para activar tu
       asistente automatizado. El proceso toma menos de 2 minutos.</p>

    <div class="field">
      <label for="nombre">Nombre del cliente</label>
      <input id="nombre" type="text" placeholder="Ej. Carnicería El Origen" autocomplete="off" />
    </div>

    <div class="field">
      <label for="agente">URL del agente</label>
      <input id="agente" type="url" placeholder="https://..." autocomplete="off" />
    </div>

    <button id="btnConnect" class="btn" disabled>
      <span id="btnLabel">Conectar WhatsApp</span>
    </button>

    <div id="status" class="status"></div>

    <div class="foot">
      Al continuar, conectas una cuenta de WhatsApp Business de tu propiedad.
      Tú conservas el control total de tu número y tu cuenta.
    </div>
  </main>

  <!-- ====================================================================
       LÓGICA — Embedded Signup
       ==================================================================== -->
  <script>
    const $ = (id) => document.getElementById(id);
    const btn      = $("btnConnect");
    const btnLabel = $("btnLabel");
    const elName   = $("nombre");
    const elUrl    = $("agente");

    let sessionInfo = { phone_number_id: null, waba_id: null, business_id: null };

    function setBtn(state) {
      // state: "idle" | "loading"
      if (state === "loading") {
        btn.disabled = true;
        btnLabel.innerHTML = '<span class="spinner"></span> Cargando…';
      } else {
        btnLabel.textContent = "Conectar WhatsApp";
        refreshButton();
      }
    }
    function setStatus(type, html) {
      const s = $("status");
      s.className = "status show " + type;
      s.innerHTML = html;
    }
    function clearStatus() {
      const s = $("status");
      s.className = "status";
      s.innerHTML = "";
    }

    function validUrl(v) {
      try { const u = new URL(v); return u.protocol === "https:" || u.protocol === "http:"; }
      catch { return false; }
    }
    function refreshButton() {
      const ok = elName.value.trim().length >= 2 && validUrl(elUrl.value.trim());
      btn.disabled = !ok;
    }
    elName.addEventListener("input", refreshButton);
    elUrl.addEventListener("input", refreshButton);

    // --- Facebook JS SDK ---
    window.fbAsyncInit = function () {
      FB.init({
        appId:   CONFIG.META_APP_ID,
        autoLogAppEvents: true,
        xfbml:   true,
        version: CONFIG.GRAPH_VERSION,
      });
    };
    (function (d, s, id) {
      let js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/en_US/sdk.js";
      fjs.parentNode.insertBefore(js, fjs);
    })(document, "script", "facebook-jssdk");

    // --- Capturar datos del WABA (evento del Embedded Signup) ---
    window.addEventListener("message", (event) => {
      try { if (!event.origin.includes("facebook.com")) return; } catch { return; }
      let data;
      try { data = JSON.parse(event.data); } catch { return; }
      if (data.type !== "WA_EMBEDDED_SIGNUP") return;

      if (data.event === "FINISH") {
        sessionInfo.phone_number_id = data.data.phone_number_id || null;
        sessionInfo.waba_id         = data.data.waba_id || null;
        sessionInfo.business_id      = data.data.business_id || data.data.business_portfolio_id || null;
      } else if (data.event === "CANCEL") {
        setStatus("warn", "Conexión cancelada en el paso: <code>" +
          (data.data && data.data.current_step ? data.data.current_step : "—") + "</code>.");
      } else if (data.event === "ERROR") {
        setStatus("err", "Meta devolvió un error: <code>" +
          (data.data && data.data.error_message ? data.data.error_message : "desconocido") + "</code>.");
      }
    });

    // --- Lanzar el popup de Embedded Signup ---
    btn.addEventListener("click", () => {
      if (typeof FB === "undefined") {
        setStatus("err", "El SDK de Facebook aún no cargó. Espera un momento y reintenta.");
        return;
      }
      sessionInfo = { phone_number_id: null, waba_id: null, business_id: null };
      clearStatus();
      setBtn("loading");

      FB.login(function (response) {
        if (response.authResponse && response.authResponse.code) {
          enviarAlta(response.authResponse.code);
        } else {
          setStatus("warn", "No se completó el inicio de sesión con Meta. Vuelve a intentarlo.");
          setBtn("idle");
        }
      }, {
        config_id: CONFIG.CONFIG_ID,
        response_type: "code",
        override_default_response_type: true,
        extras: { setup: {}, featureType: "", sessionInfoVersion: "3" },
      });
    });

    // --- Enviar code + datos al backend (wa-onboard) ---
    async function enviarAlta(code) {
      const payload = {
        code: code,
        nombre_cliente: elName.value.trim(),
        url_destino:    elUrl.value.trim(),
        waba_id:         sessionInfo.waba_id,
        phone_number_id: sessionInfo.phone_number_id,
        business_id:     sessionInfo.business_id,
      };

      try {
        const res = await fetch(CONFIG.WA_ONBOARD_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-onboard-secret": CONFIG.ONBOARD_SECRET,
          },
          body: JSON.stringify(payload),
        });

        const text = await res.text();
        let body; try { body = JSON.parse(text); } catch { body = { raw: text }; }

        if (res.ok) {
          setStatus("ok",
            "✓ <b>Cliente conectado.</b><br>" +
            "Número (phone_number_id): <code>" + (body.phone_number_id || sessionInfo.phone_number_id || "—") + "</code>");
          elName.value = ""; elUrl.value = "";
        } else {
          setStatus("err",
            "El alta falló (HTTP " + res.status + ").<br>" +
            "<code>" + (body.error || body.message || body.raw || "sin detalle") + "</code>");
        }
      } catch (err) {
        setStatus("err", "Error de red al contactar wa-onboard: <code>" + err.message + "</code>");
      } finally {
        setBtn("idle");
      }
    }
  </script>
</body>
</html>
